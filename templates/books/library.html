{% extends "base.html" %}
{% load book_filters %}
{% block title %}Stackroom{% endblock %}

{% block head %}
<style>
  .wall { background: #1a0f06; }

  .shelf-plank {
    height: 14px;
    background: linear-gradient(180deg, #c8882e 0%, #a06520 40%, #7a4a12 100%);
    box-shadow: 0 4px 14px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.07) inset;
    border-radius: 0 0 3px 3px;
    flex-shrink: 0;
  }

  .spine {
    position: relative;
    flex-shrink: 0;
    flex-grow: 0;
    overflow: hidden;
    border-radius: 2px 5px 5px 2px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
    box-shadow:
      inset 3px 0 5px rgba(255,255,255,.10),
      inset -1px 0 3px rgba(0,0,0,.35),
      -2px 0 5px rgba(0,0,0,.55),
      3px 0 9px rgba(0,0,0,.4);
    background: var(--spine-bg, #1e1008);
  }

  .spine:active {
    transform: translateY(-5px) scale(1.06);
    box-shadow: -2px 6px 22px rgba(0,0,0,.7);
    z-index: 1;
  }

  .spine-cover {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    opacity: .45;
  }

  .spine-edge {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to right,
      rgba(0,0,0,.40) 0%,
      rgba(0,0,0,.08) 30%,
      rgba(0,0,0,.08) 70%,
      rgba(0,0,0,.45) 100%
    );
  }

  .spine-text {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%) rotate(180deg);
    writing-mode: vertical-rl;
    overflow: hidden;
    max-height: calc(100% - 12px);
    white-space: nowrap;
    pointer-events: none;
  }

  .spine-title {
    font-size: 10.5px; /* overridden by JS */
    font-weight: 700;
    line-height: 1;
    letter-spacing: .04em;
    color: rgba(255,255,255,.95);
    text-shadow: 0 1px 5px rgba(0,0,0,.95), 0 0 10px rgba(0,0,0,.7);
  }

  .spine-author { display: none; }

  .spine-dot {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,.35);
  }

  /* Ghost slot absorbs leftover shelf space at end of each row */
  .spine-ghost {
    flex: 1 1 0;
    min-width: 8px;
    border-radius: 2px 5px 5px 2px;
    background: repeating-linear-gradient(
      -45deg,
      rgba(255,255,255,.018),
      rgba(255,255,255,.018) 3px,
      transparent 3px,
      transparent 10px
    );
    border: 1px dashed rgba(255,255,255,.06);
    box-sizing: border-box;
  }
</style>
{% endblock %}

{% block header_action %}
<a href="{% url 'scan' %}" class="w-9 h-9 flex items-center justify-center rounded-sm bg-ink-50/10 hover:bg-ink-50/20 transition border border-ink-50/15">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/>
  </svg>
</a>
{% endblock %}

{% block content %}

<!-- Search + filters -->
<div class="mb-0">
  <form method="get" id="search-form">
    <div class="label-slot rounded-sm px-3 py-2.5 mb-3 flex items-center gap-2 border border-ink-400/40">
      <span class="text-[11px] uppercase tracking-wide text-ink-500 flex-shrink-0">Search:</span>
      <input name="q" id="search-input" value="{{ q }}" placeholder="title, author, or description..." autocomplete="off"
        class="flex-1 bg-transparent text-sm focus:outline-none placeholder:text-ink-400">
    </div>
  </form>
</div>

<div id="shelf-container">
{% include "books/_shelf.html" %}
</div>

<script>
// --- Shelf builder: packs spines into rows based on measured width ---
// Re-run after every render (initial load, resize, and live search swaps).
var measureCtx = document.createElement('canvas').getContext('2d');

// Fit title font-size so the text length (vertical after writing-mode) stays
// within the spine's usable height. CSS handles positioning via bottom/left.
function fitTitle(spine) {
  var titleEl = spine.querySelector('.spine-title');
  if (!titleEl) return;
  var text = (titleEl.textContent || '').trim();
  if (!text) return;

  var spineH = parseInt(spine.style.height, 10) || 148;
  var spineW = parseInt(spine.style.width,  10) || 24;
  var availLen  = spineH - 14;  // max text run (spine height - padding)
  var maxFontPx = spineW - 4;   // max font-size (limited by spine width)

  var lo = 5.5, hi = maxFontPx, best = lo;
  for (var i = 0; i < 12; i++) {
    var mid = (lo + hi) / 2;
    measureCtx.font = '700 ' + mid + 'px system-ui,-apple-system,sans-serif';
    var w = measureCtx.measureText(text).width + text.length * mid * 0.04;
    if (w <= availLen) { best = mid; lo = mid; } else hi = mid;
  }

  titleEl.style.fontSize = best + 'px';
}

function buildShelf() {
  var shelf = document.getElementById('bookshelf');
  var pool  = document.getElementById('spine-pool');
  if (!shelf || !pool) return;

  var spines = Array.from(pool.children);
  var available = shelf.offsetWidth - 24; // px-3 = 12px each side
  var gap = 4;

  // Greedy row packing
  var rows = [];
  var row = [], rowW = 0;
  spines.forEach(function (spine) {
    var w = parseInt(spine.dataset.w, 10) || 24;
    var needed = row.length ? rowW + gap + w : w;
    if (row.length > 0 && needed > available) {
      rows.push(row); row = [spine]; rowW = w;
    } else {
      row.push(spine); rowW = needed;
    }
  });
  if (row.length) rows.push(row);

  // Clear any previously packed rows before rebuilding
  while (shelf.children.length > 1) shelf.removeChild(shelf.lastChild);

  // Build DOM
  rows.forEach(function (rowSpines) {
    var maxH = rowSpines.reduce(function (m, s) {
      return Math.max(m, parseInt(s.style.height, 10) || 148);
    }, 0);

    var rowEl = document.createElement('div');
    rowEl.className = 'flex items-end px-3';
    rowEl.style.gap = gap + 'px';

    rowSpines.forEach(function (spine) {
      fitTitle(spine);
      rowEl.appendChild(spine);
    });

    var ghost = document.createElement('div');
    ghost.className = 'spine-ghost';
    ghost.style.height = maxH + 'px';
    rowEl.appendChild(ghost);

    shelf.appendChild(rowEl);

    var plank = document.createElement('div');
    plank.className = 'shelf-plank';
    shelf.appendChild(plank);

    var spacer = document.createElement('div');
    spacer.style.height = '20px';
    shelf.appendChild(spacer);
  });
}

function hashColor(str) {
  var h = 5381;
  for (var i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return 'hsl(' + (Math.abs(h) % 360) + ',42%,22%)';
}

function applySpineColor(spine, img) {
  var title = spine.dataset.title || '';
  if (!img) { spine.style.background = hashColor(title); return; }

  function extract() {
    try {
      var c = document.createElement('canvas');
      c.width = 4; c.height = 24;
      var ctx = c.getContext('2d');
      ctx.drawImage(img,
        Math.floor(img.naturalWidth  * 0.2), Math.floor(img.naturalHeight * 0.2),
        Math.floor(img.naturalWidth  * 0.6), Math.floor(img.naturalHeight * 0.6),
        0, 0, 4, 24
      );
      var px = ctx.getImageData(0, 0, 4, 24).data;
      var r = 0, g = 0, b = 0, n = px.length / 4;
      for (var i = 0; i < px.length; i += 4) { r += px[i]; g += px[i+1]; b += px[i+2]; }
      var f = 0.62;
      spine.style.background =
        'rgb(' + Math.round(r/n*f) + ',' + Math.round(g/n*f) + ',' + Math.round(b/n*f) + ')';
    } catch (e) {
      spine.style.background = hashColor(title);
    }
  }

  if (img.complete && img.naturalWidth > 0) extract();
  else {
    img.addEventListener('load', extract);
    img.addEventListener('error', function () { spine.style.background = hashColor(title); });
  }
}

function colorAllSpines() {
  document.querySelectorAll('#spine-pool .spine, #bookshelf .spine').forEach(function (spine) {
    applySpineColor(spine, spine.querySelector('.spine-cover'));
  });
}

function refreshShelf() {
  buildShelf();
  colorAllSpines();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', refreshShelf);
} else {
  refreshShelf();
}

var resizeTimer;
window.addEventListener('resize', function () {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(buildShelf, 250);
});

// --- Live search: re-fetch the shelf on every keystroke, debounced ---
(function () {
  var input = document.getElementById('search-input');
  var form = document.getElementById('search-form');
  var container = document.getElementById('shelf-container');
  if (!input || !container) return;

  var debounceTimer, currentRequest;

  function runSearch() {
    var q = input.value.trim();
    var url = new URL(window.location.href);
    if (q) url.searchParams.set('q', q); else url.searchParams.delete('q');
    window.history.replaceState({}, '', url);

    if (currentRequest) currentRequest.abort();
    var controller = new AbortController();
    currentRequest = controller;

    fetch(url.pathname + url.search, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      signal: controller.signal,
    })
      .then(function (resp) { return resp.text(); })
      .then(function (html) {
        container.innerHTML = html;
        refreshShelf();
      })
      .catch(function (err) {
        if (err.name !== 'AbortError') throw err;
      });
  }

  input.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(runSearch, 200);
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearTimeout(debounceTimer);
    runSearch();
  });
})();
</script>
{% endblock %}
