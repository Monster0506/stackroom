{% extends "base.html" %}
{% block title %}Add Book{% endblock %}

{% block header_action %}
<span class="text-xs text-ink-50/60 uppercase tracking-wide">New Accession</span>
{% endblock %}

{% block content %}
<div class="flex flex-col gap-5">

  <!-- Search -->
  <div>
    <label class="text-xs font-bold text-ink-600 uppercase tracking-wide mb-2 block">Search by title or author</label>
    <div class="flex gap-2">
      <div class="label-slot border border-ink-400/40 rounded-sm px-3 flex-1 flex items-center gap-2">
        <span class="text-[11px] uppercase tracking-wide text-ink-500 flex-shrink-0">Title:</span>
        <input id="s-title" type="text" placeholder="..."
          class="flex-1 bg-transparent py-3 text-sm focus:outline-none placeholder:text-ink-400"
          onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <button onclick="doSearch()"
        class="bg-ink-900 text-ink-50 px-5 rounded-sm text-sm font-bold active:scale-95 transition">
        Search
      </button>
    </div>
    <div class="label-slot border border-ink-400/40 rounded-sm px-3 mt-2 flex items-center gap-2">
      <span class="text-[11px] uppercase tracking-wide text-ink-500 flex-shrink-0">Author:</span>
      <input id="s-author" type="text" placeholder="optional"
        class="flex-1 bg-transparent py-2.5 text-sm focus:outline-none placeholder:text-ink-400"
        onkeydown="if(event.key==='Enter') doSearch()">
    </div>
  </div>

  <!-- Search results -->
  <div id="search-results" class="hidden flex flex-col gap-2 animate-in"></div>

  <!-- Selected book preview -->
  <div id="result-card" class="hidden animate-in">
    <div class="index-card border border-ink-400/40 rounded-sm overflow-hidden">
      <div class="flex gap-4 p-4 pl-8 relative">
        <div class="punch-hole absolute left-3 top-1/2 -translate-y-1/2"></div>
        <div class="relative flex-shrink-0">
          <img id="r-cover" src="" alt="" class="w-20 h-28 object-cover rounded-sm bg-ink-200 hidden border border-ink-400/40">
          <div id="r-cover-ph" class="w-20 h-28 rounded-sm bg-ink-200 border border-ink-400/40 flex items-center justify-center px-1">
            <span class="text-[10px] uppercase tracking-wide text-ink-500 text-center font-bold">No Cover</span>
          </div>
        </div>
        <div class="flex-1 min-w-0 py-1">
          <p id="r-title" class="font-bold text-ink-900 text-base leading-tight"></p>
          <p id="r-author" class="text-sm text-ink-600 mt-1"></p>
          <p id="r-pub" class="text-xs text-ink-500 mt-0.5"></p>
        </div>
      </div>
      <div class="px-4 pb-4 pt-3 flex gap-2">
        <button onclick="saveBook()"
          class="flex-1 bg-ink-900 text-ink-50 py-3.5 rounded-sm font-bold text-sm active:scale-[0.98] transition">
          Add to Library
        </button>
        <button onclick="clearPick()"
          class="w-20 label-slot border border-ink-400/40 text-ink-600 rounded-sm text-xs font-bold uppercase tracking-wide active:scale-95 transition">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="flex items-center gap-2 text-[11px] text-ink-600">
    <div class="flex-1 h-px bg-ink-400/40"></div>ADD MANUALLY<div class="flex-1 h-px bg-ink-400/40"></div>
  </div>

  <!-- Manual entry -->
  <div class="index-card border border-ink-400/40 rounded-sm overflow-hidden">
    <button onclick="toggleManual()" class="w-full flex items-center justify-between px-5 py-4 text-left">
      <span class="font-bold text-sm text-ink-800 uppercase tracking-wide">Enter details by hand</span>
      <svg id="manual-chevron" class="w-4 h-4 text-ink-500 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
      </svg>
    </button>
    <div id="manual-body" class="hidden px-5 pb-5 flex flex-col gap-3">
      <input id="m-title" type="text" placeholder="Title *"
        class="w-full label-slot border border-ink-400/40 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <input id="m-author" type="text" placeholder="Author"
        class="w-full label-slot border border-ink-400/40 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <input id="m-isbn" type="text" placeholder="ISBN" inputmode="numeric"
        class="w-full label-slot border border-ink-400/40 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <div class="grid grid-cols-2 gap-3">
        <input id="m-publisher" type="text" placeholder="Publisher"
          class="w-full label-slot border border-ink-400/40 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
        <input id="m-year" type="text" placeholder="Year" inputmode="numeric"
          class="w-full label-slot border border-ink-400/40 rounded-sm px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      </div>
      <button onclick="saveManual()"
        class="w-full bg-ink-900 text-ink-50 py-3.5 rounded-sm font-bold text-sm active:scale-[0.98] transition mt-1">
        Add to Library
      </button>
    </div>
  </div>

</div>

<script>
  let pendingBook = null;

  function toggleManual() {
    const body = document.getElementById('manual-body');
    const chevron = document.getElementById('manual-chevron');
    body.classList.toggle('hidden');
    chevron.classList.toggle('rotate-180');
  }

  async function doSearch() {
    const title = document.getElementById('s-title').value.trim();
    if (!title) return;
    const author = document.getElementById('s-author').value.trim();
    const container = document.getElementById('search-results');
    container.innerHTML = '<div class="text-center py-6 text-ink-500 text-sm">Searching...</div>';
    container.classList.remove('hidden');
    document.getElementById('result-card').classList.add('hidden');

    const resp = await fetch(`/api/search/?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`);
    const { results = [] } = await resp.json();

    if (!results.length) {
      container.innerHTML = '<div class="text-center py-6 text-ink-500 text-sm">No results found.</div>';
      return;
    }

    container.innerHTML = results.map((b, i) => `
      <button onclick="pickBook(${i})" class="flex gap-3 index-card border border-ink-400/40 rounded-sm p-3 pl-6 relative text-left active:scale-[0.98] transition w-full">
        <div class="punch-hole absolute left-2 top-1/2 -translate-y-1/2" style="width:7px;height:7px"></div>
        ${b.cover_url
          ? `<img src="${escHtml(b.cover_url)}" class="w-12 h-16 object-cover rounded-sm bg-ink-200 border border-ink-400/40 flex-shrink-0">`
          : `<div class="w-12 h-16 rounded-sm bg-ink-200 border border-ink-400/40 flex-shrink-0 flex items-center justify-center px-0.5"><span class="text-[8px] uppercase tracking-wide text-ink-500 text-center font-bold">No Cover</span></div>`}
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-sm text-ink-900 line-clamp-2 leading-tight">${escHtml(b.title)}</p>
          <p class="text-xs text-ink-600 mt-0.5">${escHtml(b.author)}</p>
          <p class="text-xs text-ink-500 mt-0.5">${escHtml([b.publisher, b.published_date].filter(Boolean).join(' - '))}</p>
        </div>
      </button>
    `).join('');
    window._results = results;
  }

  function pickBook(i) {
    const b = window._results[i];
    pendingBook = b;
    document.getElementById('r-title').textContent = b.title;
    document.getElementById('r-author').textContent = b.author;
    document.getElementById('r-pub').textContent = [b.publisher, b.published_date].filter(Boolean).join(' - ');
    const cover = document.getElementById('r-cover'), ph = document.getElementById('r-cover-ph');
    if (b.cover_url) { cover.src = b.cover_url; cover.classList.remove('hidden'); ph.classList.add('hidden'); }
    else { cover.classList.add('hidden'); ph.classList.remove('hidden'); }
    document.getElementById('result-card').classList.remove('hidden');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearPick() {
    pendingBook = null;
    document.getElementById('result-card').classList.add('hidden');
  }

  async function saveBook() {
    if (!pendingBook) return;
    const r = await fetch('/api/save/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify(pendingBook),
    });
    const d = await r.json();
    if (d.duplicate) { alert('Already in your library!'); return; }
    window.location.href = `/book/${d.id}/`;
  }

  async function saveManual() {
    const title = document.getElementById('m-title').value.trim();
    if (!title) { document.getElementById('m-title').focus(); return; }
    const book = {
      title,
      author: document.getElementById('m-author').value.trim(),
      isbn: document.getElementById('m-isbn').value.trim(),
      publisher: document.getElementById('m-publisher').value.trim(),
      published_date: document.getElementById('m-year').value.trim(),
    };
    const r = await fetch('/api/save/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify(book),
    });
    const d = await r.json();
    if (d.duplicate) { alert('Already in your library!'); return; }
    window.location.href = `/book/${d.id}/`;
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
  }
</script>
{% endblock %}
