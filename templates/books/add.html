{% extends "base.html" %}
{% block title %}Add Book — BookTracker{% endblock %}

{% block header_action %}
<span class="text-sm text-white/60 font-medium">Add Book</span>
{% endblock %}

{% block content %}
<div class="flex flex-col gap-5">

  <!-- Search -->
  <div>
    <label class="text-xs font-semibold text-ink-500 uppercase tracking-wide mb-2 block">Search by title or author</label>
    <div class="flex gap-2">
      <div class="relative flex-1">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-300 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803 7.5 7.5 0 0016.803 15.803z"/>
        </svg>
        <input id="s-title" type="text" placeholder="Title…"
          class="w-full bg-white border border-ink-200 rounded-2xl pl-10 pr-4 py-3 text-sm shadow-card focus:outline-none focus:ring-2 focus:ring-ink-900 transition"
          onkeydown="if(event.key==='Enter') doSearch()">
      </div>
      <button onclick="doSearch()"
        class="bg-ink-900 text-white px-5 rounded-2xl text-sm font-semibold active:scale-95 transition shadow-card">
        Search
      </button>
    </div>
    <input id="s-author" type="text" placeholder="Author (optional)"
      class="mt-2 w-full bg-white border border-ink-200 rounded-2xl px-4 py-2.5 text-sm shadow-card focus:outline-none focus:ring-2 focus:ring-ink-900 transition"
      onkeydown="if(event.key==='Enter') doSearch()">
  </div>

  <!-- Search results -->
  <div id="search-results" class="hidden flex flex-col gap-2 animate-in"></div>

  <!-- Selected book preview -->
  <div id="result-card" class="hidden animate-in">
    <div class="bg-white rounded-3xl shadow-card overflow-hidden">
      <div class="flex gap-4 p-4">
        <div class="relative flex-shrink-0">
          <img id="r-cover" src="" alt="" class="w-20 h-28 object-cover rounded-2xl bg-ink-100 hidden shadow">
          <div id="r-cover-ph" class="w-20 h-28 rounded-2xl bg-gradient-to-br from-amber-100 to-amber-200 flex items-center justify-center">
            <span class="text-3xl">📖</span>
          </div>
        </div>
        <div class="flex-1 min-w-0 py-1">
          <p id="r-title" class="font-bold text-ink-900 text-base leading-tight"></p>
          <p id="r-author" class="text-sm text-ink-500 mt-1"></p>
          <p id="r-pub" class="text-xs text-ink-400 mt-0.5"></p>
        </div>
      </div>
      <div class="border-t border-ink-100 px-4 py-3">
        <label class="text-xs font-semibold text-ink-500 uppercase tracking-wide mb-2 block">Add to shelf</label>
        <div class="flex gap-2">
          <button onclick="setStatus('want')" data-status="want"
            class="status-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-ink-200 text-ink-600 bg-ink-50 active:scale-95 transition">
            Want
          </button>
          <button onclick="setStatus('reading')" data-status="reading"
            class="status-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-blue-200 text-blue-700 bg-blue-50 active:scale-95 transition">
            Reading
          </button>
          <button onclick="setStatus('read')" data-status="read"
            class="status-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-green-200 text-green-700 bg-green-50 active:scale-95 transition">
            Read
          </button>
        </div>
        <input type="hidden" id="r-status" value="want">
      </div>
      <div class="px-4 pb-4 flex gap-2">
        <button onclick="saveBook()"
          class="flex-1 bg-ink-900 text-white py-3.5 rounded-2xl font-semibold text-sm active:scale-95 transition">
          Add to Library
        </button>
        <button onclick="clearPick()"
          class="w-14 bg-white border border-ink-200 text-ink-500 rounded-2xl text-lg active:scale-95 transition">
          ✕
        </button>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="flex items-center gap-3">
    <div class="flex-1 h-px bg-ink-200"></div>
    <span class="text-xs text-ink-400 font-medium">add manually</span>
    <div class="flex-1 h-px bg-ink-200"></div>
  </div>

  <!-- Manual entry -->
  <div class="bg-white rounded-3xl shadow-card overflow-hidden">
    <button onclick="toggleManual()" class="w-full flex items-center justify-between px-5 py-4 text-left">
      <span class="font-semibold text-sm text-ink-800">Enter details manually</span>
      <svg id="manual-chevron" class="w-4 h-4 text-ink-400 transition-transform" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
      </svg>
    </button>
    <div id="manual-body" class="hidden px-5 pb-5 flex flex-col gap-3">
      <input id="m-title" type="text" placeholder="Title *"
        class="w-full bg-ink-50 border border-ink-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <input id="m-author" type="text" placeholder="Author"
        class="w-full bg-ink-50 border border-ink-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <input id="m-isbn" type="text" placeholder="ISBN" inputmode="numeric"
        class="w-full bg-ink-50 border border-ink-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      <div class="grid grid-cols-2 gap-3">
        <input id="m-publisher" type="text" placeholder="Publisher"
          class="w-full bg-ink-50 border border-ink-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
        <input id="m-year" type="text" placeholder="Year" inputmode="numeric"
          class="w-full bg-ink-50 border border-ink-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ink-900 transition">
      </div>
      <div class="flex gap-2">
        <button onclick="setManualStatus('want')" data-status="want"
          class="mstatus-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-ink-200 text-ink-600 bg-ink-50 active:scale-95 transition ring-2 ring-ink-900">Want</button>
        <button onclick="setManualStatus('reading')" data-status="reading"
          class="mstatus-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-blue-200 text-blue-700 bg-blue-50 active:scale-95 transition">Reading</button>
        <button onclick="setManualStatus('read')" data-status="read"
          class="mstatus-btn flex-1 py-2 rounded-xl text-xs font-semibold border border-green-200 text-green-700 bg-green-50 active:scale-95 transition">Read</button>
      </div>
      <input type="hidden" id="m-status" value="want">
      <button onclick="saveManual()"
        class="w-full bg-ink-900 text-white py-3.5 rounded-2xl font-semibold text-sm active:scale-95 transition mt-1">
        Add to Library
      </button>
    </div>
  </div>

</div>

<script>
  let pendingBook = null, selectedStatus = 'want', manualStatus = 'want';

  function toggleManual() {
    const body = document.getElementById('manual-body');
    const chevron = document.getElementById('manual-chevron');
    body.classList.toggle('hidden');
    chevron.classList.toggle('rotate-180');
  }

  async function doSearch() {
    const title = document.getElementById('s-title').value.trim();
    if (!title) return;
    const author = document.getElementById('s-author').value.trim();
    const container = document.getElementById('search-results');
    container.innerHTML = '<div class="text-center py-6 text-ink-400 text-sm">Searching…</div>';
    container.classList.remove('hidden');
    document.getElementById('result-card').classList.add('hidden');

    const resp = await fetch(`/api/search/?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}`);
    const { results = [] } = await resp.json();

    if (!results.length) {
      container.innerHTML = '<div class="text-center py-6 text-ink-400 text-sm">No results found.</div>';
      return;
    }

    container.innerHTML = results.map((b, i) => `
      <button onclick="pickBook(${i})" class="flex gap-3 bg-white rounded-2xl shadow-card p-3 text-left active:scale-[0.98] transition w-full">
        ${b.cover_url
          ? `<img src="${escHtml(b.cover_url)}" class="w-12 h-16 object-cover rounded-xl bg-ink-100 flex-shrink-0 shadow">`
          : `<div class="w-12 h-16 rounded-xl bg-gradient-to-br from-amber-100 to-amber-200 flex-shrink-0 flex items-center justify-center text-xl">📖</div>`}
        <div class="flex-1 min-w-0">
          <p class="font-semibold text-sm text-ink-900 line-clamp-2 leading-tight">${escHtml(b.title)}</p>
          <p class="text-xs text-ink-500 mt-0.5">${escHtml(b.author)}</p>
          <p class="text-xs text-ink-400 mt-0.5">${escHtml([b.publisher, b.published_date].filter(Boolean).join(' · '))}</p>
        </div>
      </button>
    `).join('');
    window._results = results;
  }

  function pickBook(i) {
    const b = window._results[i];
    pendingBook = b;
    document.getElementById('r-title').textContent = b.title;
    document.getElementById('r-author').textContent = b.author;
    document.getElementById('r-pub').textContent = [b.publisher, b.published_date].filter(Boolean).join(' · ');
    const cover = document.getElementById('r-cover'), ph = document.getElementById('r-cover-ph');
    if (b.cover_url) { cover.src = b.cover_url; cover.classList.remove('hidden'); ph.classList.add('hidden'); }
    else { cover.classList.add('hidden'); ph.classList.remove('hidden'); }
    document.getElementById('result-card').classList.remove('hidden');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearPick() {
    pendingBook = null;
    document.getElementById('result-card').classList.add('hidden');
  }

  function setStatus(val) {
    selectedStatus = val;
    document.getElementById('r-status').value = val;
    document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('ring-2', b.dataset.status === val));
    document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('ring-ink-900', b.dataset.status === val));
  }

  function setManualStatus(val) {
    manualStatus = val;
    document.getElementById('m-status').value = val;
    document.querySelectorAll('.mstatus-btn').forEach(b => b.classList.toggle('ring-2', b.dataset.status === val));
    document.querySelectorAll('.mstatus-btn').forEach(b => b.classList.toggle('ring-ink-900', b.dataset.status === val));
  }

  async function saveBook() {
    if (!pendingBook) return;
    pendingBook.status = selectedStatus;
    const r = await fetch('/api/save/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify(pendingBook),
    });
    const d = await r.json();
    if (d.duplicate) { alert('Already in your library!'); return; }
    window.location.href = `/book/${d.id}/`;
  }

  async function saveManual() {
    const title = document.getElementById('m-title').value.trim();
    if (!title) { document.getElementById('m-title').focus(); return; }
    const book = {
      title,
      author: document.getElementById('m-author').value.trim(),
      isbn: document.getElementById('m-isbn').value.trim(),
      publisher: document.getElementById('m-publisher').value.trim(),
      published_date: document.getElementById('m-year').value.trim(),
      status: manualStatus,
    };
    const r = await fetch('/api/save/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
      body: JSON.stringify(book),
    });
    const d = await r.json();
    if (d.duplicate) { alert('Already in your library!'); return; }
    window.location.href = `/book/${d.id}/`;
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : null;
  }
</script>
{% endblock %}
